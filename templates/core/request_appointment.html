{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-lg glass-card overflow-hidden animate-slideUp">
            <div class="bg-primary p-5 text-center text-white position-relative overflow-hidden">
                <div class="position-absolute top-0 start-0 w-100 h-100 opacity-10" style="background: radial-gradient(circle at center, white 0%, transparent 70%);"></div>
                <div class="rounded-circle bg-white text-primary d-inline-flex p-4 mb-4 shadow-lg animate-pulse">
                    <i class="fas fa-calendar-check fa-3x"></i>
                </div>
                <h2 class="fw-900 mb-0">Book an Appointment</h2>
            </div>
            
            <div class="card-body p-5">
                <div class="badge bg-primary-subtle text-primary border border-primary-subtle p-3 w-100 rounded-4 mb-5 d-flex align-items-center">
                    <div class="p-2 bg-white rounded-circle me-3">
                        <i class="fas fa-check text-primary extra-small"></i>
                    </div>
                    <div class="text-start">
                        <div class="fw-900 extra-small uppercase tracking-widest">Find Your Doctor</div>
                        <div class="small fw-600 opacity-75">We'll help you find the best doctor based on your needs.</div>
                    </div>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-5">
                        <label class="form-label small fw-800 text-muted uppercase tracking-wider mb-2">Tell us how you are feeling</label>
                        <textarea name="reason" class="form-control-premium px-4 pt-3" rows="4" id="id_reason" placeholder="e.g. 'I have a constant headache' or 'My knee hurts when I walk'"></textarea>
                        {% if form.reason.errors %}
                        <div class="text-danger extra-small mt-2 fw-700 animate-shake">
                             <i class="fas fa-circle-exclamation me-1"></i> {{ form.reason.errors|first }}
                        </div>
                        {% endif %}
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-primary btn-lg shadow-premium py-3 rounded-pill fw-800">
                            Book Now <i class="fas fa-paper-plane ms-2"></i>
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-link text-muted fw-700 text-decoration-none hover-text-primary text-center">
                            Go Back
                        </a>
                    </div>
                </form>
            </div>
            
            <div class="card-footer bg-light p-4 text-center border-0">
                <p class="text-muted extra-small uppercase tracking-widest fw-700 mb-0">
                    <i class="fas fa-lock me-1"></i> Your information is secure
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
